<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Speech to Text</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.4rem; }
    p.subtitle { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }

    .mic-btn {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: none;
      background: #6c63ff;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      display: block;
      margin: 0 auto 1.5rem;
      transition: background 0.2s, transform 0.1s;
    }
    .mic-btn:hover { background: #574fd6; }
    .mic-btn.recording { background: #e74c3c; animation: pulse 1s infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .status {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1.5rem;
      min-height: 20px;
    }

    .upload-section {
      border-top: 1px solid #eee;
      padding-top: 1.5rem;
      margin-top: 0.5rem;
    }
    .upload-label {
      font-size: 0.85rem;
      color: #555;
      display: block;
      margin-bottom: 0.5rem;
    }
    input[type="file"] {
      font-size: 0.85rem;
      width: 100%;
      margin-bottom: 0.75rem;
    }
    .upload-btn {
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.5rem 1.2rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .upload-btn:hover { background: #e5e5e5; }

    .result-box {
      margin-top: 1.5rem;
      background: #f8f8ff;
      border: 1px solid #e0e0ff;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      display: none;
    }
    .result-box.visible { display: block; }
    .result-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6c63ff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }
    .transcript-text {
      font-size: 1rem;
      line-height: 1.6;
      color: #222;
    }
    .lang-badge {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.75rem;
      background: #ededff;
      color: #534AB7;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .copy-btn {
      float: right;
      font-size: 0.75rem;
      background: none;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 2px 8px;
      cursor: pointer;
      color: #666;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>Speech to Text</h1>
  <p class="subtitle">Press the mic and speak, or upload an audio file.</p>

  <button class="mic-btn" id="micBtn" title="Click to record">🎤</button>
  <p class="status" id="status">Click the mic to start recording</p>

  <div class="upload-section">
    <span class="upload-label">Or upload a file (.wav, .mp3, .m4a, .ogg)</span>
    <input type="file" id="fileInput" accept=".wav,.mp3,.m4a,.ogg,.flac,.webm" />
    <button class="upload-btn" onclick="uploadFile()">Transcribe file</button>
  </div>

  <div class="result-box" id="resultBox">
    <div class="result-label">
      Transcript
      <button class="copy-btn" onclick="copyText()">Copy</button>
    </div>
    <div class="transcript-text" id="transcriptText"></div>
    <span class="lang-badge" id="langBadge"></span>
  </div>
</div>

<script>
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;

  const micBtn = document.getElementById('micBtn');
  const status = document.getElementById('status');
  const resultBox = document.getElementById('resultBox');
  const transcriptText = document.getElementById('transcriptText');
  const langBadge = document.getElementById('langBadge');

  micBtn.addEventListener('click', toggleRecording);

  async function toggleRecording() {
    if (!isRecording) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          stream.getTracks().forEach(t => t.stop());
          await sendAudio(blob, 'recording.webm');
        };

        mediaRecorder.start();
        isRecording = true;
        micBtn.classList.add('recording');
        micBtn.textContent = '⏹';
        status.textContent = 'Recording... click to stop';
      } catch (err) {
        status.textContent = 'Microphone access denied. Please allow it in browser settings.';
      }
    } else {
      mediaRecorder.stop();
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.textContent = '🎤';
      status.textContent = 'Processing...';
    }
  }

  async function uploadFile() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) { status.textContent = 'Please select a file first.'; return; }
    status.textContent = 'Uploading and transcribing...';
    await sendAudio(file, file.name);
  }

  async function sendAudio(blob, filename) {
    const formData = new FormData();
    formData.append('file', blob, filename);

    try {
      const res = await fetch('/transcribe', { method: 'POST', body: formData });
      const data = await res.json();

      if (!res.ok) {
        status.textContent = 'Error: ' + (data.detail || 'Something went wrong');
        return;
      }

      transcriptText.textContent = data.transcript;
      langBadge.textContent = 'Language: ' + data.language;
      resultBox.classList.add('visible');
      status.textContent = 'Done!';
    } catch (err) {
      status.textContent = 'Could not reach the server. Is it running?';
    }
  }

  function copyText() {
    navigator.clipboard.writeText(transcriptText.textContent);
  }
</script>
</body>
</html>
