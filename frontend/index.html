<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speech-to-Text Developer Platform</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Main Content Area -->
  <main class="main-content" style="margin-left: 0; padding: 2rem; max-width: 800px; margin: 0 auto;">
    <section id="view-playground" class="view-section active">
      <h1 style="text-align: center;">Live Real-Time Transcription</h1>
      <p style="text-align: center;">Test the Deepgram transcription API directly in the browser.</p>
      
      <div class="glass-card" style="margin-top: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
          <h2>Live Test</h2>
        </div>

        <div class="playground-controls" style="text-align: center; margin: 2rem 0;">
          <button class="mic-btn" id="micBtn" title="Click to record" style="font-size: 3rem; padding: 1rem; border-radius: 50%;">🎤</button>
          <p id="pgStatus" style="color: var(--text-secondary); font-size: 1.1rem; margin-top: 1rem;">Click the mic to start recording</p>
        </div>

        <div class="result-box visible" id="pgResultBox" style="margin-top: 2rem;">
          <h3 style="margin-bottom: 0.5rem; color: var(--accent-primary);">Transcript</h3>
          <div class="transcript-text" id="pgTranscript" style="min-height: 150px; font-size: 1.2rem; line-height: 1.6;"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
